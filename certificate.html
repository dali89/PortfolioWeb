<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certifications</title>
    <link rel="stylesheet" href="portfolio.css">
    <style>
        :root {
            --bg-color: #081b29;
            --second-bg-color: #112e42;
            --text-color: #ededed;
            --main-color: #00abf0;
        }

        .heading {
            font-size: 5rem;
            margin-bottom: 3rem;
            text-align: center;
            color: #fff;
        }

        .heading span {
            color: var(--main-color);
        }

        .certificates {
            background: var(--bg-color);
            padding: 10rem 9% 7rem;
            text-align: center;
        }

        .certificates .heading {
            margin-bottom: 5rem;
        }

        .certificates-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(30rem, 1fr));
            gap: 3rem;
        }

        .certificate-box {
            background: var(--second-bg-color);
            border-radius: 1.5rem;
            border: 2px solid transparent;
            overflow: hidden;
            transition: 0.5s ease;
        }

        .certificate-box:hover {
            border-color: var(--main-color);
            transform: translateY(-10px);
            box-shadow: 0 0 20px rgba(0, 171, 240, 0.3);
        }

        .certificate-img {
            position: relative;
            width: 100%;
            height: 20rem;
            overflow: hidden;
        }

        .certificate-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s ease;
        }

        .certificate-box:hover .certificate-img img {
            transform: scale(1.1);
        }

        /* Image overlay effect */
        .certificate-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent, var(--main-color));
            display: flex;
            justify-content: center;
            align-items: center;
            transform: translateY(100%);
            transition: 0.5s ease;
        }

        .certificate-box:hover .certificate-layer {
            transform: translateY(0);
        }

        .certificate-layer a {
            width: 5rem;
            height: 5rem;
            background: var(--text-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: .3s;
        }

        /* Icon styling inside the white circle */
        .certificate-layer a img {
            width: 2.5rem; /* Icon ka size */
            height: 2.5rem;
            object-fit: contain;
        }

        .certificate-layer a:hover {
            background: var(--main-color);
        }

        .certificate-content {
            padding: 2rem;
            text-align: left;
        }

        .certificate-content h3 {
            font-size: 2rem;
            color: var(--main-color);
        }

        .certificate-content p {
            font-size: 1.5rem;
            margin: 1rem 0;
            color: var(--text-color);
        }

        .certificate-content span {
            font-size: 1.2rem;
            color: var(--main-color);
            font-weight: 600;
        }
    </style>
</head>
<body>

<section class="certificates" id="certificates">
    <h2 class="heading">My <span>Certifications</span></h2>

    <div class="certificates-container">
        <div class="certificate-box">
            <div class="certificate-img">
                <img src="images/cert1.jpg" alt="Web Development">
                <div class="certificate-layer">
                    <a href="images/cert1.jpg" target="_blank">
                        <img src="images/link.png" alt="link">
                    </a>
                </div>
            </div>
            <div class="certificate-content">
                <h3>Full Stack Web Development</h3>
                <p>Issued by: Coursera (Google)</p>
                <span>Jan 2024</span>
            </div>
        </div>

        <div class="certificate-box">
            <div class="certificate-img">
                <img src="images/cert2.jpg" alt="UI/UX Design">
                <div class="certificate-layer">
                    <a href="images/cert2.jpg" target="_blank">
                        <img src="images/link.png" alt="link">
                    </a>
                </div>
            </div>
            <div class="certificate-content">
                <h3>Advanced UI/UX Design</h3>
                <p>Issued by: Udemy</p>
                <span>March 2024</span>
            </div>
        </div>

        <div class="certificate-box">
            <div class="certificate-img">
                <img src="images/Ecoo.webp" alt="Python Certificate">
                <div class="certificate-layer">
                    <a href="images/Ecoo.webp" target="_blank">
                        <img src="images/link.png" alt="link">
                    </a>
                </div>
            </div>
            <div class="certificate-content">
                <h3>Python Data Science</h3>
                <p>Issued by: IBM</p>
                <span>June 2023</span>
            </div>
        </div>
    </div>
</section>

</body>
</html>
